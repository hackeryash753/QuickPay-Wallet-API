services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "QuickPay@123"
      MSSQL_MEMORY_LIMIT_MB: "1024"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  quickpay-api:
    build: .
    container_name: quickpay-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__QuickPayConnectionString: "Server=sqlserver,1433;Database=QuickPayDb;User Id=sa;Password=QuickPay@123;TrustServerCertificate=True"
      Jwt__Key: "QuickPay@2026#VeryStrongJwtSecretKey12345"
      Redis__ConnectionString: "redis:6379"
      RabbitMQ__HostName: "rabbitmq"
    depends_on:
      - sqlserver
      - rabbitmq
      - redis
    restart: unless-stopped

volumes:
  sqlserver_data: